---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox-csi-plugin
  namespace: csi-proxmox
spec:
  dependsOn:
  - name: sealed-secrets
    namespace: kube-system
  interval: 30m
  chart:
    spec:
      chart: proxmox-csi-plugin
      version: "0.3.5"
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: proxmox-csi-plugin
        namespace: flux-system
  values:
    config:
      clusters:
        - url: https://pve-cluster01.simn.io:8006/api2/json
          insecure: false
          token_id: "kubernetes-csi@pve!csi"
          token_secret: "b22498d9-9920-4a73-ae94-10958c48a65a"
          region: pve-cluster01

    node:
      tolerations:
        - operator: Exists

    nodeSelector:
      node-role.kubernetes.io/control-plane: ""

    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule

    storageClass:
      - name: proxmox-data
        storage: shared-ceph-k8s
        reclaimPolicy: Delete
        fstype: xfs
        cache: writeback
        ssd: true
        mountOptions:
          - discard
        annotations:
          storageclass.kubernetes.io/is-default-class: true
      - name: proxmox-data-ext4
        storage: shared-ceph-k8s
        reclaimPolicy: Delete
        fstype: ext4
        cache: writeback
        ssd: true
        mountOptions:
          - discard

    hostAliases:
      - ip: 127.0.0.1
        hostnames:
          - pve-cluster01.simn.io

    initContainers:
      - name: loadbalancer
        restartPolicy: Always
        image: ghcr.io/sergelogvinov/haproxy:2.8.6-alpine3.19
        imagePullPolicy: IfNotPresent
        env:
          - name: SVC
            value: proxmox.kube-system.svc.cluster.local
          - name: PORT
            value: "8006"
        securityContext:
          runAsUser: 99
          runAsGroup: 99
        resources:
          limits:
            cpu: 50m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi

