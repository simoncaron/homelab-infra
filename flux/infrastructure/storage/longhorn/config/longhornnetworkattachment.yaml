---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: longhorn-network
  namespace: longhorn-system
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth1",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "10.15.15.0/24",
        "exclude": [
          "10.15.15.246/32",
          "10.15.15.247/32",
          "10.15.15.248/32"
        ]
      }
    }'
